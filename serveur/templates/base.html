{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}Digital Scholar{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /> 
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="{% static 'css/site.css' %}" />
{% block extra_head %}{% endblock %}
</head>
<body>
<div class="layout">

  <!-- Top bar -->
  <header class="topbar">
    <span class="brand">Digital Scholar</span>
    <div class="avatar" title="{{ request.user.username }}">
      {{ request.user.username|first|upper }}
    </div>
  </header>

  <!-- Sidebar -->
  <nav class="sidebar">
    <a href="{% url 'analytics:dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Tableau de bord
    </a>
    <a href="{% url 'analytics:article_list' %}" class="{% if request.resolver_match.url_name == 'article_list' or request.resolver_match.url_name == 'article_detail' %}active{% endif %}">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Articles
    </a>
    <a href="{% url 'analytics:utilisateurs' %}" class="{% if request.resolver_match.url_name == 'utilisateurs' %}active{% endif %}">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Utilisateurs
    </a>
    <a href="{% url 'logout' %}" style="margin-top:auto">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Déconnexion
    </a>
  </nav>

  <!-- Page content -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>

</div>
{% block extra_js %}{% endblock %}
</body>
</html>
